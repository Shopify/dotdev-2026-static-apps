query Input($offerId: ID!) {
  cart {
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
        }
      }
    }
  }
  discount {
    discountClasses
  }
  shop {
    offer: metaobject(id: $offerId) {
      variant: field(key: "variant") {
        value
      }
      minimumCartValue: field(key: "minimum_cart_value") {
        value
      }
    }
  }
}
